<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }
    .splash {
      background: #0F172A;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .logo svg {
      width: 32px;
      height: 32px;
    }
    h1 {
      color: #E2E8F0;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: #94A3B8;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .loader {
      width: 120px;
      height: 3px;
      background: #1E293B;
      border-radius: 2px;
      margin: 0 auto;
      overflow: hidden;
    }
    .loader::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: #2563EB;
      border-radius: 2px;
      animation: loading 1.2s ease-in-out infinite;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(200%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </div>
    <h1>Linker Pro</h1>
    <p>Starting your dashboard...</p>
    <div class="loader"></div>
  </div>
</body>
</html>
